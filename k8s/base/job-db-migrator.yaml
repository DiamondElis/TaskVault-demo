apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrator
  namespace: demo-prod
  labels:
    app.kubernetes.io/name: taskvault
    app.kubernetes.io/component: db-migrator
    app.kubernetes.io/part-of: taskvault-demo
    app.kubernetes.io/managed-by: github-actions
    cnapp.demo/environment: demo-prod
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: taskvault
        app.kubernetes.io/component: db-migrator
        app.kubernetes.io/part-of: taskvault-demo
        app.kubernetes.io/managed-by: github-actions
        cnapp.demo/environment: demo-prod
    spec:
      serviceAccountName: db-migrator-sa
      restartPolicy: OnFailure
      containers:
        - name: db-migrator
          image: taskvault-backend
          imagePullPolicy: IfNotPresent
          command: ["node", "dist/src/db/migrate-and-seed.js"]
          envFrom:
            - configMapRef:
                name: app-config
            - configMapRef:
                name: backend-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
