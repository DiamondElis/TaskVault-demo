apiVersion: batch/v1
kind: Job
metadata:
  name: report-job
  namespace: demo-prod
  labels:
    app.kubernetes.io/name: taskvault
    app.kubernetes.io/component: report-job
    app.kubernetes.io/part-of: taskvault-demo
    app.kubernetes.io/managed-by: github-actions
    cnapp.demo/environment: demo-prod
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: taskvault
        app.kubernetes.io/component: report-job
        app.kubernetes.io/part-of: taskvault-demo
        app.kubernetes.io/managed-by: github-actions
        cnapp.demo/environment: demo-prod
    spec:
      serviceAccountName: report-job-sa
      restartPolicy: Never
      containers:
        - name: report-job
          image: taskvault-worker
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              wget -qO- http://worker-internal-service:8081/worker/healthz >/dev/null
              wget -qO- http://backend-service:8080/api/healthz >/dev/null
              echo "TaskVault report-job demo complete"
          envFrom:
            - configMapRef:
                name: app-config
            - configMapRef:
                name: worker-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
