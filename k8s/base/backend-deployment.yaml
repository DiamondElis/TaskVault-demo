# vuln-8: runs as root, no resource limits (spec §4.2).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: demo-prod
  labels:
    app.kubernetes.io/name: taskvault
    app.kubernetes.io/component: backend-api
    app.kubernetes.io/part-of: taskvault-demo
    app.kubernetes.io/managed-by: github-actions
    cnapp.demo/environment: demo-prod
    cnapp.demo/intentional-risk: "true"
    cnapp.demo/risk-id: vuln-8
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: taskvault
      app.kubernetes.io/component: backend-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: taskvault
        app.kubernetes.io/component: backend-api
        app.kubernetes.io/part-of: taskvault-demo
        app.kubernetes.io/managed-by: github-actions
        cnapp.demo/environment: demo-prod
        cnapp.demo/intentional-risk: "true"
        cnapp.demo/risk-id: vuln-8
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: backend-api
          image: taskvault-backend
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            runAsUser: 0
          envFrom:
            - configMapRef:
                name: app-config
            - configMapRef:
                name: backend-config
            - configMapRef:
                name: feature-flags
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET
            - name: USE_SECRETS_MANAGER
              value: "true"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          # Resource limits intentionally omitted (vuln-8 / T106).
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: backend-config-volume
              mountPath: /etc/taskvault/backend
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: backend-config-volume
          configMap:
            name: backend-config
        - name: tmp
          emptyDir: {}
