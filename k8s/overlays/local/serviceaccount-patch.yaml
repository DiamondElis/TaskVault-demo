# Dummy IRSA annotations for local kind — no real OIDC/web identity on kind.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: demo-prod
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/taskvault-backend-role-local-dummy
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: worker-sa
  namespace: demo-prod
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/taskvault-worker-role-local-dummy
