# TaskVault local kind cluster — ingress-ready control plane with host port maps.
# See docs/kind-local.md for local vs EKS differences.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: taskvault
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8088
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
