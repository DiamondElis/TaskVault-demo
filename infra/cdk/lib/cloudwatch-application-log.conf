# T156 — Route demo-prod TaskVault container stdout to /taskvault/* log groups.

[INPUT]
    Name                tail
    Tag                 backend
    Path                /var/log/containers/*_demo-prod_backend-api-*.log
    DB                  /var/fluent-bit/state/taskvault_backend.db
    Mem_Buf_Limit       50MB
    Skip_Long_Lines     On
    Refresh_Interval    10
    Rotate_Wait         30
    multiline.parser    docker, cri

[INPUT]
    Name                tail
    Tag                 worker
    Path                /var/log/containers/*_demo-prod_worker-*.log
    DB                  /var/fluent-bit/state/taskvault_worker.db
    Mem_Buf_Limit       50MB
    Skip_Long_Lines     On
    Refresh_Interval    10
    Rotate_Wait         30
    multiline.parser    docker, cri

[INPUT]
    Name                tail
    Tag                 frontend
    Path                /var/log/containers/*_demo-prod_frontend-*.log
    DB                  /var/fluent-bit/state/taskvault_frontend.db
    Mem_Buf_Limit       50MB
    Skip_Long_Lines     On
    Refresh_Interval    10
    Rotate_Wait         30
    multiline.parser    docker, cri

[OUTPUT]
    Name                cloudwatch_logs
    Match               backend*
    region              ${AWS_REGION}
    log_group_name      /taskvault/backend
    log_stream_prefix   ${HOST_NAME}-
    auto_create_group   true

[OUTPUT]
    Name                cloudwatch_logs
    Match               worker*
    region              ${AWS_REGION}
    log_group_name      /taskvault/worker
    log_stream_prefix   ${HOST_NAME}-
    auto_create_group   true

[OUTPUT]
    Name                cloudwatch_logs
    Match               frontend*
    region              ${AWS_REGION}
    log_group_name      /taskvault/frontend
    log_stream_prefix   ${HOST_NAME}-
    auto_create_group   true
