apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app.kubernetes.io/component: report-cronjob
    app.kubernetes.io/managed-by: github-actions
    app.kubernetes.io/name: taskvault
    app.kubernetes.io/part-of: taskvault-demo
    cnapp.demo/environment: demo-prod
  name: report-cronjob
  namespace: demo-prod
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/component: report-cronjob
            app.kubernetes.io/managed-by: github-actions
            app.kubernetes.io/name: taskvault
            app.kubernetes.io/part-of: taskvault-demo
            cnapp.demo/environment: demo-prod
        spec:
          containers:
          - command:
            - node
            - -e
            - |
              const email = process.env.DEMO_ADMIN_EMAIL || 'admin@taskvault.demo';
              const password = process.env.DEMO_ADMIN_PASSWORD || 'password123';
              const backend = 'http://backend-service:8080';
              const login = await fetch(`${backend}/api/auth/login`, {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify({ email, password }),
              });
              if (!login.ok) throw new Error(`login failed: ${login.status}`);
              const { token } = await login.json();
              const report = await fetch(`${backend}/api/admin/reports/run`, {
                method: 'POST',
                headers: { authorization: `Bearer ${token}` },
              });
              if (!report.ok) throw new Error(`report trigger failed: ${report.status}`);
              console.log(await report.text());
            envFrom:
            - configMapRef:
                name: app-config
            - configMapRef:
                name: worker-config
            - configMapRef:
                name: backend-config
            image: taskvault-worker:local
            imagePullPolicy: IfNotPresent
            name: report-cronjob
            resources:
              limits:
                cpu: 200m
                memory: 256Mi
              requests:
                cpu: 50m
                memory: 64Mi
          restartPolicy: OnFailure
          serviceAccountName: report-job-sa
      ttlSecondsAfterFinished: 86400
  schedule: '*/15 * * * *'
  successfulJobsHistoryLimit: 1
  suspend: true
---
