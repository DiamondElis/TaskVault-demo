    app.kubernetes.io/component: backend-api
    app.kubernetes.io/managed-by: github-actions
    app.kubernetes.io/name: taskvault
    app.kubernetes.io/part-of: taskvault-demo
    cnapp.demo/environment: demo-prod
    cnapp.demo/intentional-risk: "true"
    cnapp.demo/risk-id: vuln-8
  name: backend-api
  namespace: demo-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: backend-api
      app.kubernetes.io/name: taskvault
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend-api
        app.kubernetes.io/managed-by: github-actions
        app.kubernetes.io/name: taskvault
        app.kubernetes.io/part-of: taskvault-demo
        cnapp.demo/environment: demo-prod
        cnapp.demo/intentional-risk: "true"
        cnapp.demo/risk-id: vuln-8
    spec:
      containers:
      - env:
        - name: USE_SECRETS_MANAGER
          value: "false"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              key: DATABASE_URL
              name: db-credentials
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              key: JWT_SECRET
              name: app-secret
        - name: K8S_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        envFrom:
        - configMapRef:
            name: app-config
        - configMapRef:
            name: backend-config
        - configMapRef:
            name: feature-flags
        image: taskvault-backend:local
        imagePullPolicy: Never
        livenessProbe:
          httpGet:
            path: /api/healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
        name: backend-api
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          httpGet:
            path: /api/readyz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          runAsUser: 0
        volumeMounts:
        - mountPath: /etc/taskvault/backend
          name: backend-config-volume
          readOnly: true
        - mountPath: /tmp
          name: tmp
      serviceAccountName: backend-sa
      volumes:
      - configMap:
          name: backend-config
        name: backend-config-volume
      - emptyDir: {}
        name: tmp
---
