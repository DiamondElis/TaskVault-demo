    cnapp.demo/environment: demo-prod
  name: db-migrator
  namespace: demo-prod
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: db-migrator
        app.kubernetes.io/managed-by: github-actions
        app.kubernetes.io/name: taskvault
        app.kubernetes.io/part-of: taskvault-demo
        cnapp.demo/environment: demo-prod
    spec:
      containers:
      - command:
        - node
        - dist/src/db/migrate-and-seed.js
        env:
        - name: USE_SECRETS_MANAGER
          value: "false"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              key: DATABASE_URL
              name: db-credentials
        envFrom:
        - configMapRef:
            name: app-config
        - configMapRef:
            name: backend-config
        image: taskvault-backend-migrator:local
        imagePullPolicy: Never
        name: db-migrator
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
      restartPolicy: OnFailure
      serviceAccountName: db-migrator-sa
  ttlSecondsAfterFinished: 86400
